<style>
    /* Custom Scrollbar Styles */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: #ffffff;
    }
    ::-webkit-scrollbar-thumb {
        background-color: #d1d5db; /* gray-300 */
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background-color: #9ca3af; /* gray-400 */
    }
    * {
      scrollbar-width: thin;
      scrollbar-color: #d1d5db #ffffff;
    }

    /* --- SOLUCIÓN DEFINITIVA PARA INPUTS Y AUTOCOMPLETADO --- */
    
    /* Regla base para todos los inputs: Fondo blanco, texto negro */
    input, select, textarea {
        background-color: #ffffff !important;
        color: #111827 !important; /* gray-900 */
        border-color: #d1d5db; /* gray-300 */
    }

    /* Parche para Webkit (Chrome, Edge, Safari) Autocomplete */
    /* Usa una sombra interior blanca muy fuerte para tapar el color azul pálido del navegador */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px white inset !important;
        -webkit-text-fill-color: #111827 !important;
        caret-color: #111827 !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    /* --- ANIMACIONES DE ENTRADA CINEMATOGRÁFICAS --- */
    @keyframes enter-animation {
        0% { opacity: 0; transform: translateY(20px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-enter {
        animation: enter-animation 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
</style>
